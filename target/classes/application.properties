# DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/unievtdb
spring.datasource.username=unievt
spring.datasource.password=unievt
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# App
server.port=8080
spring.application.name=UniEvent-backend

# ── OpenAPI / Swagger ──────────────────────────────────────────────────────
# URL serveur annoncée dans le document OpenAPI (surchargeable via env OPENAPI_SERVER_URL)
app.openapi.server-url=${OPENAPI_SERVER_URL:http://localhost:${server.port}}

# ── JWT ────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:S3cr3tK3yF0rUn1Ev3ntTh@tIsL0ngEnoughF0r256B1t}
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-days=7

# ── CORS ───────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002}

# ── Frontend (lien de vérification email) ──────────────────────────────────
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# ── Flyway ─────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ── Actuator (base : exposition minimale et sécurisée) ─────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.metrics.tags.application=${spring.application.name}

# ── Mail (override per profile; defaults to no-op) ─────────────────────────
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:1025}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# ── Thymeleaf ──────────────────────────────────────────────────────────────
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
