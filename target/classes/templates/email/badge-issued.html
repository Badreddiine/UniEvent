<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head><meta charset="UTF-8"><title>Badge disponible</title></head>
<body style="font-family:Arial,sans-serif;background:#f5f5f5;padding:20px">
  <div style="max-width:600px;margin:auto;background:#fff;border-radius:8px;overflow:hidden">
    <div style="background:#7c3aed;padding:24px;color:#fff">
      <h1 style="margin:0;font-size:22px">Votre badge est prêt 🏅</h1>
    </div>
    <div style="padding:24px">
      <p>Bonjour <strong th:text="${userName}">Étudiant</strong>,</p>
      <p>Votre badge pour l'événement
         <strong th:text="${eventName}">événement</strong> a été généré.</p>
      <p>Connectez-vous à UniEvent pour télécharger votre badge avec QR code.</p>
      <p th:if="${qrImage}">
        <img th:src="'data:image/png;base64,' + ${qrImage}"
             alt="QR Code" style="width:200px;height:200px"/>
      </p>
      <p style="color:#888;font-size:12px;margin-top:32px">UniEvent — Gestion d'événements universitaires</p>
    </div>
  </div>
</body>
</html>
