name: Deploy UniEvent Backend

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # keep-alive : empêche le service Render (free tier) de s'endormir
    - cron: "*/8 * * * *"

jobs:
  # ── 1. Tests backend ────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend (Java 21)
    runs-on: ubuntu-latest
    # Ne pas tester sur le déclenchement planifié (réservé au keep-alive)
    if: github.event_name != 'schedule'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: unievtdb
          POSTGRES_USER: unievt
          POSTGRES_PASSWORD: unievt
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U unievt -d unievtdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      # NOTE : le projet Maven est à la racine du repo backend.
      # En cas de monorepo, ajouter "working-directory: UniEvent-backend".
      - name: Run tests
        run: |
          chmod +x mvnw
          ./mvnw test -B

  # ── 2. Déploiement backend sur Render ───────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Render)
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.event_name != 'schedule'
    steps:
      - name: Trigger Render deploy hook
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  # ── 3. Keep-alive (toutes les 8 minutes) ────────────────────────────────────
  keep-alive:
    name: Keep Backend Awake
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Ping health endpoint
        run: curl -f "${{ secrets.BACKEND_HEALTH_URL }}"
