spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # MailHog (mock SMTP — start with docker-compose.dev.yml)
  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

logging:
  level:
    root: INFO
    com.unievt: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true

# Expose Prometheus/metrics en dev pour le scraping local (Prometheus + Grafana)
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,loggers
  endpoint:
    health:
      show-details: when_authorized
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
