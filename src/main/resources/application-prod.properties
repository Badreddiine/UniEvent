# ============================================================================
# UniEvent — Profil PRODUCTION (Render) — partie PROPERTIES
# Périmètre : datasource, redis, mail, actuator, logging.
# (JWT + CORS → application-prod.yml)
# Activé via SPRING_PROFILES_ACTIVE=prod
# ============================================================================

# ── DataSource (PostgreSQL) ─────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── HikariCP ────────────────────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=UniEventHikariPool
spring.datasource.hikari.auto-commit=false

# ── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ── Redis (SSL) ─────────────────────────────────────────────────────────────
spring.data.redis.url=${SPRING_DATA_REDIS_URL}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true

# ── Mail (SMTP + STARTTLS) ──────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── Flyway ──────────────────────────────────────────────────────────────────
# Désactiver l'exécution automatique des migrations si elles sont en échec :
# décommenter la ligne ci-dessous.
# spring.flyway.enabled=false

# ── Actuator / Monitoring ───────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=when_authorized
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.info.env.enabled=true
info.app.name=UniEvent Backend
info.app.version=@project.version@

# Export des métriques assuré par l'agent OpenTelemetry (pas par Spring)
management.otlp.metrics.export.enabled=false

# ── Swagger / OpenAPI (désactivé en prod) ───────────────────────────────────
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# ── Logging ─────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.unievt=INFO
logging.level.org.springframework=INFO
# Désactive les logs SQL verbeux
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN
