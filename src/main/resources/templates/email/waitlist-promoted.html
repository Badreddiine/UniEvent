<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head><meta charset="UTF-8"><title>Place disponible</title></head>
<body style="font-family:Arial,sans-serif;background:#f5f5f5;padding:20px">
  <div style="max-width:600px;margin:auto;background:#fff;border-radius:8px;overflow:hidden">
    <div style="background:#10b981;padding:24px;color:#fff">
      <h1 style="margin:0;font-size:22px">Bonne nouvelle — vous êtes inscrit ! 🎉</h1>
    </div>
    <div style="padding:24px">
      <p>Bonjour <strong th:text="${userName}">Étudiant</strong>,</p>
      <p>Une place s'est libérée pour l'événement
         <strong th:text="${eventName}">événement</strong>.</p>
      <p>Votre inscription est désormais <strong>confirmée</strong>.
         Votre badge sera disponible prochainement.</p>
      <p style="color:#888;font-size:12px;margin-top:32px">UniEvent — Gestion d'événements universitaires</p>
    </div>
  </div>
</body>
</html>
